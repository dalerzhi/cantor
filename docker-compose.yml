version: '3.9'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: cantor-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cantor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cantor_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cantor}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cantor} -d ${POSTGRES_DB:-cantor}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - cantor-network

  # Redis 缓存/消息队列
  redis:
    image: redis:7-alpine
    container_name: cantor-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - cantor-network

  # Brain 服务 (Python FastAPI)
  brain:
    build:
      context: ./cantor-brain
      dockerfile: Dockerfile
    container_name: cantor-brain
    restart: unless-stopped
    environment:
      DEBUG: ${DEBUG:-false}
      PROJECT_NAME: ${PROJECT_NAME:-Cantor Brain}
      VERSION: ${VERSION:-1.0.0}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-cantor}:${POSTGRES_PASSWORD:-cantor_secret}@postgres:5432/${POSTGRES_DB:-cantor}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS:-7}
      PASSWORD_MIN_LENGTH: ${PASSWORD_MIN_LENGTH:-12}
      PASSWORD_HASH_COST: ${PASSWORD_HASH_COST:-12}
      MAX_FAILED_LOGIN_ATTEMPTS: ${MAX_FAILED_LOGIN_ATTEMPTS:-5}
      LOCKOUT_DURATION_MINUTES: ${LOCKOUT_DURATION_MINUTES:-30}
      API_KEY_PREFIX: ${API_KEY_PREFIX:-cantor_}
      API_KEY_LENGTH: ${API_KEY_LENGTH:-48}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    ports:
      - "${BRAIN_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - cantor-network

  # Gateway 服务 (Go WebSocket)
  gateway:
    build:
      context: ./cantor-gateway
      dockerfile: Dockerfile
    container_name: cantor-gateway
    restart: unless-stopped
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379/0
      PORT: ${GATEWAY_PORT:-8766}
    ports:
      - "${GATEWAY_PORT:-8766}:8766"
    depends_on:
      redis:
        condition: service_healthy
      brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8766/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cantor-network

  # Frontend 服务 (Next.js)
  frontend:
    build:
      context: ./cantor-frontend
      dockerfile: Dockerfile
    container_name: cantor-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - brain
    networks:
      - cantor-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cantor-network:
    driver: bridge
